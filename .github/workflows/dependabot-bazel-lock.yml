name: dependabot-bazel-lock

on:
  pull_request:
    paths:
      - Cargo.lock
      - '**/Cargo.toml'
      - MODULE.bazel.lock

permissions: {}

jobs:
  update:
    if: >-
      github.event.pull_request.user.login == 'dependabot[bot]' &&
      github.event.pull_request.head.repo.full_name == github.repository
    permissions:
      contents: read
      pull-requests: read
    runs-on: ubuntu-latest
    steps:
      # Cargo Dependabot PRs should change only Cargo metadata and this
      # generated lockfile. Check that contract before using a push token.
      - id: scope
        uses: actions/github-script@v9
        with:
          script: |
            const { owner, repo } = context.repo;
            const { number } = context.issue;
            const { data: pr } = await github.rest.pulls.get({
              owner,
              repo,
              pull_number: number,
            });
            const sameRepository =
              pr.head.repo?.full_name === `${owner}/${repo}`;
            const cargoBranch =
              /^dependabot\/cargo\/[A-Za-z0-9._/-]+$/.test(pr.head.ref);
            if (
              pr.user?.login !== "dependabot[bot]" ||
              pr.state !== "open" ||
              !sameRepository ||
              !cargoBranch
            ) {
              core.notice("Skipping: the pull request is not an open same-repository Dependabot Cargo PR.");
              core.setOutput("eligible", "false");
              return;
            }

            const files = await github.paginate(
              github.rest.pulls.listFiles,
              { owner, repo, pull_number: number, per_page: 100 },
            );
            // Cargo manifests and Cargo.lock are data inputs to crate.from_cargo.
            // MODULE.bazel.lock is the only generated file this job may add.
            const isCargoInput = ({ filename }) =>
              filename === "Cargo.lock" ||
              /(^|\/)Cargo\.toml$/.test(filename);
            const allowed =
              files.some(isCargoInput) &&
              files.every(
                file =>
                  isCargoInput(file) ||
                  file.filename === "MODULE.bazel.lock",
              );
            if (!allowed) {
              core.notice(
                "Skipping: the pull request changes files outside Cargo inputs and MODULE.bazel.lock.",
              );
              core.setOutput("eligible", "false");
              return;
            }
            core.setOutput("eligible", "true");
            core.setOutput("head_ref", pr.head.ref);
            core.setOutput("head_sha", pr.head.sha);

      - uses: actions/checkout@v6
        if: steps.scope.outputs.eligible == 'true'
        with:
          # Do not leave even the read-only checkout token in git config.
          # The write token is exposed only after regeneration is checked.
          persist-credentials: false
          ref: ${{ steps.scope.outputs.head_sha }}

      - name: Regenerate Bazel lockfile
        if: steps.scope.outputs.eligible == 'true'
        run: bazel mod deps --lockfile_mode=update

      - name: Verify generated scope
        if: steps.scope.outputs.eligible == 'true'
        run: |
          set -euo pipefail
          # MODULE.bazel.lock is the only derived output this workflow owns.
          if ! git diff --quiet -- . ':(exclude)MODULE.bazel.lock'; then
            git diff -- . ':(exclude)MODULE.bazel.lock'
            exit 1
          fi

      # Dependabot can rebase while Bazel is running. Refuse to write if the
      # validated PR head moved or the PR closed.
      - id: current
        if: steps.scope.outputs.eligible == 'true'
        uses: actions/github-script@v9
        env:
          EXPECTED_HEAD_SHA: ${{ steps.scope.outputs.head_sha }}
        with:
          script: |
            const { owner, repo } = context.repo;
            const { number } = context.issue;
            const { data: pr } = await github.rest.pulls.get({
              owner,
              repo,
              pull_number: number,
            });
            if (
              pr.state !== "open" ||
              pr.head.sha !== process.env.EXPECTED_HEAD_SHA
            ) {
              core.notice("Skipping: the Dependabot head changed while Bazel was running.");
              core.setOutput("eligible", "false");
              return;
            }
            core.setOutput("eligible", "true");

      - name: Commit and push lockfile
        if: steps.current.outputs.eligible == 'true'
        env:
          # Dependabot-triggered workflows cannot read Actions secrets, so
          # CRABBY_GITHUB_TOKEN must also be configured as a Dependabot secret.
          CRABBY_GITHUB_TOKEN: ${{ secrets.CRABBY_GITHUB_TOKEN }}
          HEAD_REF: ${{ steps.scope.outputs.head_ref }}
          HEAD_SHA: ${{ steps.scope.outputs.head_sha }}
        run: |
          set -euo pipefail
          if git diff --quiet -- MODULE.bazel.lock; then
            exit 0
          fi
          test -n "$CRABBY_GITHUB_TOKEN"
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -- MODULE.bazel.lock
          # Dependabot may discard this generated commit during a rebase; the
          # next synchronize event regenerates the lock for the new Cargo.lock.
          git commit --message 'build: regenerate Bazel lockfile' \
            --message '[dependabot skip]'
          git remote set-url origin "https://x-access-token:${CRABBY_GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          # The lease prevents a stale run from recreating or overwriting a
          # Dependabot branch after the validated head moved.
          git push --porcelain \
            --force-with-lease="refs/heads/${HEAD_REF}:${HEAD_SHA}" \
            origin "HEAD:refs/heads/${HEAD_REF}"
